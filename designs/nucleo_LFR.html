<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STM32 Line Following Robot</title>

    <!-- KiCanvas -->
    <script type="module" src="https://kicanvas.org/kicanvas/kicanvas.js"></script>

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
            background: #0f1117;
            color: #e2e4ea;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .topbar a {
            color: #8b90a0;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .topbar a:hover {
            color: #51cf66;
        }

        .topbar a svg {
            width: 16px;
            height: 16px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .topbar h1 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .github-link {
            margin-left: auto;
            color: #e2e4ea;
            background: #1a1d29;
            border: 1px solid #2a2e3d;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 0.55rem 0.9rem;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 0.45rem;
            transition: all 0.2s ease;
        }

        .github-link:hover {
            color: #ffffff;
            border-color: #51cf66;
            background: #202433;
        }

        .github-link svg {
            width: 18px;
            height: 18px;
        }

        .viewer {
            flex: 1;
            padding: 0 1.5rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .viewer-tabs {
            display: flex;
            gap: 0.5rem;
        }

        .tab-btn {
            background: #1a1d29;
            color: #aeb4c5;
            border: 1px solid #2a2e3d;
            padding: 0.55rem 1.1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab-btn:hover {
            color: #ffffff;
            border-color: #51cf66;
        }

        .tab-btn.active {
            background: #51cf66;
            color: #07120a;
            border-color: #51cf66;
        }

        .viewer-frame {
            width: 100%;
            height: calc(100vh - 130px);
            border: 1px solid #2a2e3d;
            border-radius: 12px;
            overflow: hidden;
            background: #11141b;
            position: relative;
        }

        kicanvas-embed {
            width: 100%;
            height: 100%;
            display: block;
            background: #000000;
        }

        .viewer-iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
            background: #11141b;
        }

        .viewer-message {
            width: 100%;
            height: 100%;
            display: grid;
            place-items: center;
            padding: 2rem;
            text-align: center;
            color: #aeb4c5;
            background: #11141b;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .viewer-message code {
            color: #51cf66;
        }

        @media (max-width: 720px) {
            .topbar {
                align-items: flex-start;
                flex-direction: column;
            }

            .topbar-left {
                width: 100%;
                flex-wrap: wrap;
            }

            .github-link {
                margin-left: 0;
            }

            .viewer {
                padding: 0 1rem 1rem;
            }

            .viewer-frame {
                height: calc(100vh - 185px);
            }
        }
    </style>
</head>

<body>
    <div class="topbar">
        <div class="topbar-left">
            <a href="../index.html">
                <svg viewBox="0 0 24 24">
                    <path d="M19 12H5m7-7-7 7 7 7"/>
                </svg>
                Back
            </a>
            <h1>STM32 Line Following Robot</h1>
        </div>

        <a
            class="github-link"
            href="https://github.com/thura-robotics/stm32-line_follower"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="View STM32 Line Following Robot repository on GitHub"
        >
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                    fill="currentColor"
                    d="M12 2C6.48 2 2 6.58 2 12.26c0 4.53 2.87 8.37 6.84 9.73.5.1.68-.22.68-.49 0-.24-.01-.88-.01-1.73-2.78.62-3.37-1.37-3.37-1.37-.45-1.18-1.11-1.5-1.11-1.5-.91-.64.07-.63.07-.63 1 .07 1.53 1.06 1.53 1.06.9 1.57 2.36 1.12 2.93.86.09-.67.35-1.12.63-1.38-2.22-.26-4.56-1.14-4.56-5.08 0-1.12.39-2.04 1.03-2.76-.1-.26-.45-1.31.1-2.72 0 0 .84-.28 2.75 1.05A9.35 9.35 0 0 1 12 6.96c.85 0 1.7.12 2.5.34 1.9-1.33 2.74-1.05 2.74-1.05.55 1.41.2 2.46.1 2.72.64.72 1.03 1.64 1.03 2.76 0 3.95-2.34 4.82-4.57 5.08.36.32.68.95.68 1.92 0 1.38-.01 2.5-.01 2.84 0 .27.18.59.69.49A10.05 10.05 0 0 0 22 12.26C22 6.58 17.52 2 12 2Z"
                />
            </svg>
            View on GitHub
        </a>
    </div>

    <div class="viewer">
        <div class="viewer-tabs">
            <button class="tab-btn" data-tab="sch">SCH</button>
            <button class="tab-btn active" data-tab="pcb">PCB</button>
            <button class="tab-btn" data-tab="model3d">3D</button>
        </div>

        <div id="viewerFrame" class="viewer-frame"></div>
    </div>

    <script>
        const SCH_URL = "https://raw.githubusercontent.com/thura-robotics/stm32-line_follower/main/pcb/STM32F4_LineFollower.kicad_sch";
        const PCB_URL = "https://raw.githubusercontent.com/thura-robotics/stm32-line_follower/main/pcb/STM32F4_LineFollower.kicad_pcb";

        /*
            Use your real STEP file path here.

            This URL must point directly to the raw .stp or .step file.
            Do not use a github.com/.../blob/... URL.
        */
        const STEP_URL = "https://raw.githubusercontent.com/thura-robotics/stm32-line_follower/main/mechanical/STM32F4_LineFollower.stp";

        const viewerFrame = document.getElementById("viewerFrame");
        const tabButtons = document.querySelectorAll(".tab-btn");

        function cleanupCurrentViewer() {
            viewerFrame.innerHTML = "";
        }

        function loadKiCanvas(src) {
            cleanupCurrentViewer();

            const kicanvas = document.createElement("kicanvas-embed");

            kicanvas.setAttribute("src", src);
            kicanvas.setAttribute("controls", "full");
            kicanvas.setAttribute("theme", "kicad");
            kicanvas.setAttribute("controls-align", "kicad");

            viewerFrame.appendChild(kicanvas);
        }

        function load3DViewerNet(src) {
            cleanupCurrentViewer();

            if (!src || src.includes("blob/")) {
                const message = document.createElement("div");
                message.className = "viewer-message";
                message.innerHTML = `
                    <div>
                        <strong>3D model URL is not a raw STEP file.</strong><br>
                        Please use a raw GitHub URL ending with <code>.stp</code> or <code>.step</code>.
                    </div>
                `;
                viewerFrame.appendChild(message);
                return;
            }

            const iframe = document.createElement("iframe");

            iframe.className = "viewer-iframe";
            iframe.src = `https://3dviewer.net/#model=${encodeURIComponent(src)}`;
            iframe.title = "3D STEP model viewer";
            iframe.loading = "lazy";

            iframe.setAttribute("allowfullscreen", "");
            iframe.setAttribute("referrerpolicy", "no-referrer-when-downgrade");

            viewerFrame.appendChild(iframe);
        }

        function switchTab(tab) {
            tabButtons.forEach(button => {
                button.classList.toggle("active", button.dataset.tab === tab);
            });

            if (tab === "sch") {
                loadKiCanvas(SCH_URL);
            } else if (tab === "pcb") {
                loadKiCanvas(PCB_URL);
            } else if (tab === "model3d") {
                load3DViewerNet(STEP_URL);
            }
        }

        tabButtons.forEach(button => {
            button.addEventListener("click", () => {
                switchTab(button.dataset.tab);
            });
        });

        // Default tab
        switchTab("pcb");
    </script>
</body>
</html>
