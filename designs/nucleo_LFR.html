<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STM32 Line Following Robot</title>

    <!-- KiCanvas -->
    <script type="module" src="https://kicanvas.org/kicanvas/kicanvas.js"></script>

    <!-- Google model-viewer -->
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
            background: #0f1117;
            color: #e2e4ea;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .topbar a {
            color: #8b90a0;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .topbar a:hover {
            color: #51cf66;
        }

        .topbar a svg {
            width: 16px;
            height: 16px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .topbar h1 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .viewer {
            flex: 1;
            padding: 0 1.5rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .viewer-tabs {
            display: flex;
            gap: 0.5rem;
        }

        .tab-btn {
            background: #1a1d29;
            color: #aeb4c5;
            border: 1px solid #2a2e3d;
            padding: 0.55rem 1.1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab-btn:hover {
            color: #ffffff;
            border-color: #51cf66;
        }

        .tab-btn.active {
            background: #51cf66;
            color: #07120a;
            border-color: #51cf66;
        }

        .viewer-frame {
            width: 100%;
            height: calc(100vh - 130px);
            border: 1px solid #2a2e3d;
            border-radius: 12px;
            overflow: hidden;
            background: #000000;
        }

        kicanvas-embed,
        model-viewer {
            width: 100%;
            height: 100%;
            display: block;
            background: #000000;
        }

        model-viewer {
            --poster-color: #000000;
            --progress-bar-color: #51cf66;
            --progress-bar-height: 3px;
        }

        .model-loading {
            width: 100%;
            height: 100%;
            display: grid;
            place-items: center;
            color: #aeb4c5;
            background: #000000;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="topbar">
        <a href="../index.html">
            <svg viewBox="0 0 24 24">
                <path d="M19 12H5m7-7-7 7 7 7"/>
            </svg>
            Back to Portfolio
        </a>
        <h1>STM32 LFR</h1>
    </div>

    <div class="viewer">
        <div class="viewer-tabs">
            <button class="tab-btn" data-tab="sch">SCH</button>
            <button class="tab-btn active" data-tab="pcb">PCB</button>
            <button class="tab-btn" data-tab="model3d">3D</button>
        </div>

        <div id="viewerFrame" class="viewer-frame"></div>
    </div>

    <script>
        const SCH_URL = "https://raw.githubusercontent.com/thura-robotics/stm32-line_follower/main/pcb/STM32F4_LineFollower.kicad_sch";
        const PCB_URL = "https://raw.githubusercontent.com/thura-robotics/stm32-line_follower/main/pcb/STM32F4_LineFollower.kicad_pcb";
        const MODEL_URL = "https://raw.githubusercontent.com/thura-robotics/stm32-line_follower/main/mechanical/STM32F4_LineFollower.glb";

        const viewerFrame = document.getElementById("viewerFrame");
        const tabButtons = document.querySelectorAll(".tab-btn");

        function loadKiCanvas(src) {
            viewerFrame.innerHTML = "";

            const kicanvas = document.createElement("kicanvas-embed");

            // Important: this line was missing in your current version
            kicanvas.setAttribute("src", src);

            // KiCanvas settings
            kicanvas.setAttribute("controls", "full");
            kicanvas.setAttribute("theme", "kicad");
            kicanvas.setAttribute("controls-align", "kicad");

            viewerFrame.appendChild(kicanvas);
        }

        function load3DModel(src) {
            viewerFrame.innerHTML = "";

            const modelViewer = document.createElement("model-viewer");

            modelViewer.setAttribute("src", src);
            modelViewer.setAttribute("alt", "3D model of STM32 line following robot PCB");

            // Disable "click or tap to interact"
            modelViewer.setAttribute("interaction-prompt", "none");

            // Smooth navigation
            modelViewer.setAttribute("camera-controls", "");
            modelViewer.setAttribute("interpolation-decay", "120");

            // Default top view
            modelViewer.setAttribute("camera-orbit", "0deg 0deg auto");
            modelViewer.setAttribute("camera-target", "auto auto auto");
            modelViewer.setAttribute("field-of-view", "25deg");
            modelViewer.setAttribute("min-field-of-view", "10deg");
            modelViewer.setAttribute("max-field-of-view", "45deg");

            // Higher quality rendering
            modelViewer.setAttribute("shadow-intensity", "1");
            modelViewer.setAttribute("shadow-softness", "0.8");
            modelViewer.setAttribute("environment-image", "neutral");
            modelViewer.setAttribute("exposure", "1");
            modelViewer.setAttribute("tone-mapping", "commerce");

            // Optional but useful for PCB models
            modelViewer.setAttribute("ar", "");
            modelViewer.setAttribute("disable-tap", "");

            const loadingDiv = document.createElement("div");
            loadingDiv.className = "model-loading";
            loadingDiv.slot = "poster";
            loadingDiv.textContent = "Loading 3D model...";

            modelViewer.appendChild(loadingDiv);
            viewerFrame.appendChild(modelViewer);
        }

        function switchTab(tab) {
            tabButtons.forEach(button => {
                button.classList.toggle("active", button.dataset.tab === tab);
            });

            if (tab === "sch") {
                loadKiCanvas(SCH_URL);
            } else if (tab === "pcb") {
                loadKiCanvas(PCB_URL);
            } else if (tab === "model3d") {
                load3DModel(MODEL_URL);
            }
        }

        tabButtons.forEach(button => {
            button.addEventListener("click", () => {
                switchTab(button.dataset.tab);
            });
        });

        // Default tab
        switchTab("pcb");
    </script>
</body>
</html>
