<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STM32 Line Following Robot</title>

    <!-- KiCanvas -->
    <script type="module" src="https://kicanvas.org/kicanvas/kicanvas.js"></script>

    <!-- Three.js import map -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
            background: #0f1117;
            color: #e2e4ea;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .topbar a {
            color: #8b90a0;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .topbar a:hover {
            color: #51cf66;
        }

        .topbar a svg {
            width: 16px;
            height: 16px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .topbar h1 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .viewer {
            flex: 1;
            padding: 0 1.5rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .viewer-tabs {
            display: flex;
            gap: 0.5rem;
        }

        .tab-btn {
            background: #1a1d29;
            color: #aeb4c5;
            border: 1px solid #2a2e3d;
            padding: 0.55rem 1.1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab-btn:hover {
            color: #ffffff;
            border-color: #51cf66;
        }

        .tab-btn.active {
            background: #51cf66;
            color: #07120a;
            border-color: #51cf66;
        }

        .viewer-frame {
            width: 100%;
            height: calc(100vh - 130px);
            border: 1px solid #2a2e3d;
            border-radius: 12px;
            overflow: hidden;
            background: #000000;
            position: relative;
        }

        kicanvas-embed {
            width: 100%;
            height: 100%;
            display: block;
            background: #000000;
        }

        .three-canvas {
            width: 100%;
            height: 100%;
            display: block;
            background: #000000;
        }

        .viewer-status {
            position: absolute;
            left: 1rem;
            bottom: 1rem;
            background: rgba(15, 17, 23, 0.82);
            color: #aeb4c5;
            border: 1px solid #2a2e3d;
            border-radius: 8px;
            padding: 0.5rem 0.75rem;
            font-size: 0.8rem;
            pointer-events: none;
            z-index: 5;
        }

        .viewer-error {
            color: #ff8787;
        }

        .three-toolbar {
            position: absolute;
            top: 1rem;
            right: 1rem;
            z-index: 10;
            display: flex;
            gap: 0.4rem;
        }

        .three-toolbar button {
            background: rgba(26, 29, 41, 0.92);
            color: #e2e4ea;
            border: 1px solid #2a2e3d;
            border-radius: 7px;
            padding: 0.45rem 0.7rem;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .three-toolbar button:hover {
            border-color: #51cf66;
            color: #51cf66;
        }
    </style>
</head>

<body>
    <div class="topbar">
        <a href="../index.html">
            <svg viewBox="0 0 24 24">
                <path d="M19 12H5m7-7-7 7 7 7"/>
            </svg>
            Back to Portfolio
        </a>
        <h1>STM32 Line Following Robot</h1>
    </div>

    <div class="viewer">
        <div class="viewer-tabs">
            <button class="tab-btn" data-tab="sch">SCH</button>
            <button class="tab-btn active" data-tab="pcb">PCB</button>
            <button class="tab-btn" data-tab="model3d">3D</button>
        </div>

        <div id="viewerFrame" class="viewer-frame"></div>
    </div>

    <script type="module">
        import * as THREE from "three";
        import { OrbitControls } from "three/addons/controls/OrbitControls.js";
        import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

        const SCH_URL = "https://raw.githubusercontent.com/thura-robotics/stm32-line_follower/main/pcb/STM32F4_LineFollower.kicad_sch";
        const PCB_URL = "https://raw.githubusercontent.com/thura-robotics/stm32-line_follower/main/pcb/STM32F4_LineFollower.kicad_pcb";
        const MODEL_URL = "https://raw.githubusercontent.com/thura-robotics/stm32-line_follower/main/mechanical/STM32F4_LineFollower.glb";

        const viewerFrame = document.getElementById("viewerFrame");
        const tabButtons = document.querySelectorAll(".tab-btn");

        let threeCleanup = null;

        function cleanupCurrentViewer() {
            if (threeCleanup) {
                threeCleanup();
                threeCleanup = null;
            }

            viewerFrame.innerHTML = "";
        }

        function loadKiCanvas(src) {
            cleanupCurrentViewer();

            const kicanvas = document.createElement("kicanvas-embed");

            kicanvas.setAttribute("src", src);
            kicanvas.setAttribute("controls", "full");
            kicanvas.setAttribute("theme", "kicad");
            kicanvas.setAttribute("controls-align", "kicad");

            viewerFrame.appendChild(kicanvas);
        }

        function load3DModel(src) {
            cleanupCurrentViewer();

            const status = document.createElement("div");
            status.className = "viewer-status";
            status.textContent = "Loading 3D model...";
            viewerFrame.appendChild(status);

            const toolbar = document.createElement("div");
            toolbar.className = "three-toolbar";
            toolbar.innerHTML = `
                <button type="button" data-view="top">Top</button>
                <button type="button" data-view="front">Front</button>
                <button type="button" data-view="side">Side</button>
                <button type="button" data-view="reset">Reset</button>
            `;
            viewerFrame.appendChild(toolbar);

            const canvas = document.createElement("canvas");
            canvas.className = "three-canvas";
            viewerFrame.appendChild(canvas);

            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            const camera = new THREE.PerspectiveCamera(
                35,
                viewerFrame.clientWidth / viewerFrame.clientHeight,
                0.1,
                10000
            );

            const renderer = new THREE.WebGLRenderer({
                canvas,
                antialias: true,
                alpha: false,
                powerPreference: "high-performance"
            });

            renderer.setSize(viewerFrame.clientWidth, viewerFrame.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            renderer.outputColorSpace = THREE.SRGBColorSpace;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;

            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;

            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.075;
            controls.screenSpacePanning = true;
            controls.enablePan = true;
            controls.enableZoom = true;
            controls.rotateSpeed = 0.75;
            controls.zoomSpeed = 0.85;
            controls.panSpeed = 0.75;

            const ambientLight = new THREE.AmbientLight(0xffffff, 1.4);
            scene.add(ambientLight);

            const keyLight = new THREE.DirectionalLight(0xffffff, 2.2);
            keyLight.position.set(4, 6, 8);
            keyLight.castShadow = true;
            keyLight.shadow.mapSize.width = 2048;
            keyLight.shadow.mapSize.height = 2048;
            scene.add(keyLight);

            const fillLight = new THREE.DirectionalLight(0xffffff, 0.8);
            fillLight.position.set(-5, -3, 4);
            scene.add(fillLight);

            const rimLight = new THREE.DirectionalLight(0xffffff, 0.9);
            rimLight.position.set(0, 5, -8);
            scene.add(rimLight);

            const gridHelper = new THREE.GridHelper(100, 20, 0x2a2e3d, 0x171a24);
            gridHelper.visible = true;
            scene.add(gridHelper);

            const axesHelper = new THREE.AxesHelper(20);
            axesHelper.visible = false;
            scene.add(axesHelper);

            let model = null;
            let modelCenter = new THREE.Vector3(0, 0, 0);
            let modelSize = new THREE.Vector3(1, 1, 1);
            let modelRadius = 100;

            function fitCameraToModel(view = "top") {
                const distance = modelRadius * 2.2;

                if (view === "top") {
                    camera.position.set(modelCenter.x, modelCenter.y + distance, modelCenter.z);
                    camera.up.set(0, 0, -1);
                } else if (view === "front") {
                    camera.position.set(modelCenter.x, modelCenter.y, modelCenter.z + distance);
                    camera.up.set(0, 1, 0);
                } else if (view === "side") {
                    camera.position.set(modelCenter.x + distance, modelCenter.y, modelCenter.z);
                    camera.up.set(0, 1, 0);
                } else {
                    camera.position.set(
                        modelCenter.x + distance * 0.8,
                        modelCenter.y + distance * 0.65,
                        modelCenter.z + distance * 0.8
                    );
                    camera.up.set(0, 1, 0);
                }

                camera.near = Math.max(modelRadius / 100, 0.01);
                camera.far = modelRadius * 100;
                camera.lookAt(modelCenter);
                camera.updateProjectionMatrix();

                controls.target.copy(modelCenter);
                controls.minDistance = modelRadius * 0.25;
                controls.maxDistance = modelRadius * 8;
                controls.update();
            }

            function prepareModel(root) {
                const box = new THREE.Box3().setFromObject(root);
                modelCenter = box.getCenter(new THREE.Vector3());
                modelSize = box.getSize(new THREE.Vector3());
                modelRadius = Math.max(modelSize.x, modelSize.y, modelSize.z);

                root.position.sub(modelCenter);

                const updatedBox = new THREE.Box3().setFromObject(root);
                modelCenter = updatedBox.getCenter(new THREE.Vector3());
                modelSize = updatedBox.getSize(new THREE.Vector3());
                modelRadius = Math.max(modelSize.x, modelSize.y, modelSize.z);

                root.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;

                        if (child.material) {
                            child.material.side = THREE.DoubleSide;

                            if ("metalness" in child.material) {
                                child.material.metalness = Math.min(child.material.metalness + 0.05, 1.0);
                            }

                            if ("roughness" in child.material) {
                                child.material.roughness = Math.max(child.material.roughness, 0.35);
                            }
                        }
                    }
                });

                gridHelper.scale.setScalar(Math.max(modelRadius / 50, 1));
            }

            const loader = new GLTFLoader();

            loader.load(
                src,
                (gltf) => {
                    model = gltf.scene;
                    prepareModel(model);
                    scene.add(model);

                    status.textContent = "3D model loaded";
                    setTimeout(() => {
                        if (status.parentElement) {
                            status.remove();
                        }
                    }, 1200);

                    fitCameraToModel("top");
                },
                (event) => {
                    if (event.lengthComputable) {
                        const percent = Math.round((event.loaded / event.total) * 100);
                        status.textContent = `Loading 3D model... ${percent}%`;
                    }
                },
                (error) => {
                    console.error(error);
                    status.classList.add("viewer-error");
                    status.textContent = "Failed to load 3D model. Check the MODEL_URL path and file format.";
                }
            );

            toolbar.addEventListener("click", (event) => {
                const button = event.target.closest("button");
                if (!button) return;

                const view = button.dataset.view;

                if (view === "top") {
                    fitCameraToModel("top");
                } else if (view === "front") {
                    fitCameraToModel("front");
                } else if (view === "side") {
                    fitCameraToModel("side");
                } else if (view === "reset") {
                    fitCameraToModel("reset");
                }
            });

            function onResize() {
                if (!viewerFrame.contains(canvas)) return;

                const width = viewerFrame.clientWidth;
                const height = viewerFrame.clientHeight;

                camera.aspect = width / height;
                camera.updateProjectionMatrix();

                renderer.setSize(width, height);
            }

            window.addEventListener("resize", onResize);

            let animationId = null;

            function animate() {
                animationId = requestAnimationFrame(animate);

                controls.update();
                renderer.render(scene, camera);
            }

            animate();

            threeCleanup = () => {
                window.removeEventListener("resize", onResize);

                if (animationId) {
                    cancelAnimationFrame(animationId);
                }

                controls.dispose();

                scene.traverse((object) => {
                    if (object.geometry) {
                        object.geometry.dispose();
                    }

                    if (object.material) {
                        if (Array.isArray(object.material)) {
                            object.material.forEach((material) => material.dispose());
                        } else {
                            object.material.dispose();
                        }
                    }
                });

                renderer.dispose();
            };
        }

        function switchTab(tab) {
            tabButtons.forEach(button => {
                button.classList.toggle("active", button.dataset.tab === tab);
            });

            if (tab === "sch") {
                loadKiCanvas(SCH_URL);
            } else if (tab === "pcb") {
                loadKiCanvas(PCB_URL);
            } else if (tab === "model3d") {
                load3DModel(MODEL_URL);
            }
        }

        tabButtons.forEach(button => {
            button.addEventListener("click", () => {
                switchTab(button.dataset.tab);
            });
        });

        switchTab("pcb");
    </script>
</body>
</html>
